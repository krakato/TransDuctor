<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransDuctor</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🌐 TransDuctor</h1>
                <p class="subtitle">Traductor Inteligente</p>
            </div>
            <a href="options.html" class="settings-btn" title="Configuración">⚙️</a>
        </header>

        <main>
            <!-- Status -->
            <div class="status-section">
                <label class="toggle-container">
                    <span>Extensión activa</span>
                    <input type="checkbox" id="enableToggle" checked>
                    <span class="toggle-switch"></span>
                </label>
            </div>

            <!-- Language Selector -->
            <div class="section">
                <label for="targetLanguage">Idioma destino:</label>
                <select id="targetLanguage">
                    <optgroup label="Populares">
                        <option value="inglés">English - Inglés</option>
                        <option value="español">Español - Spanish</option>
                        <option value="francés">Français - Francés</option>
                        <option value="alemán">Deutsch - Alemán</option>
                        <option value="portugués">Português - Portugués</option>
                        <option value="italiano">Italiano - Italiano</option>
                        <option value="japonés">日本語 - Japonés</option>
                        <option value="chino mandarin">中文 - Chino Mandarín</option>
                    </optgroup>
                    <optgroup label="Otros">
                        <option value="ruso">Русский - Ruso</option>
                        <option value="árabe">العربية - Árabe</option>
                        <option value="coreano">한국어 - Coreano</option>
                        <option value="tailandés">ไทย - Tailandés</option>
                        <option value="turco">Türkçe - Turco</option>
                        <option value="polaco">Polski - Polaco</option>
                        <option value="holandés">Nederlands - Holandés</option>
                        <option value="sueco">Svenska - Sueco</option>
                        <option value="vietnamita">Tiếng Việt - Vietnamita</option>
                        <option value="griego">Ελληνικά - Griego</option>
                    </optgroup>
                </select>
            </div>

            <!-- API Key Configuration -->
            <div class="section">
                <label for="groqApiKey">🔑 Clave API de Groq:</label>
                <div class="api-key-container">
                    <input type="password" id="groqApiKey" placeholder="gsk_..." class="api-key-input">
                    <button id="toggleApiKeyVisibility" class="toggle-visibility-btn">👁️</button>
                </div>
                <small class="api-key-help">
                    Obtén una clave gratuita en <a href="https://console.groq.com/" target="_blank">console.groq.com</a>
                </small>
            </div>

            <!-- Source Language -->
            <div class="section">
                <label for="sourceLanguage">Idioma de origen:</label>
                <select id="sourceLanguage">
                    <option value="auto">🤖 Automático</option>
                    <option value="inglés">English - Inglés</option>
                    <option value="español">Español - Spanish</option>
                    <option value="francés">Français - Francés</option>
                </select>
            </div>

            <!-- Translation Mode -->
            <div class="section">
                <label for="translationMode">Modo de traducción:</label>
                <select id="translationMode">
                    <option value="word">📍 Palabra bajo cursor</option>
                    <option value="paragraph">📄 Párrafo completo</option>
                    <option value="selection">✂️ Texto seleccionado</option>
                    <option value="ctrl">⌨️ Solo con Ctrl</option>
                </select>
            </div>

            <!-- Require Ctrl -->
            <div class="section">
                <label class="toggle-container">
                    <span>Requerir tecla Ctrl</span>
                    <input type="checkbox" id="requireCtrl">
                    <span class="toggle-switch"></span>
                </label>
            </div>

            <!-- Skip Same Language -->
            <div class="section">
                <label class="toggle-container">
                    <span>No traducir si idioma es igual</span>
                    <input type="checkbox" id="skipSameLanguage" checked>
                    <span class="toggle-switch"></span>
                </label>
            </div>

            <!-- Hover Delay -->
            <div class="section">
                <label for="hoverDelay">Tiempo de espera (ms):</label>
                <div class="slider-container">
                    <input type="range" id="hoverDelay" min="500" max="5000" step="250" value="2000">
                    <span id="hoverDelayValue">2000ms</span>
                </div>
            </div>

            <!-- Font Size -->
            <div class="section">
                <label for="fontSize">Tamaño de fuente:</label>
                <div class="slider-container">
                    <input type="range" id="fontSize" min="10" max="18" step="1" value="12">
                    <span id="fontSizeValue">12px</span>
                </div>
            </div>

            <!-- Theme -->
            <div class="section">
                <label for="theme">Tema:</label>
                <select id="theme">
                    <option value="dark">🌙 Oscuro</option>
                    <option value="light">☀️ Claro</option>
                </select>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <button id="testTranslate" class="btn-primary">
                    🧪 Probar traducción
                </button>
                <button id="resetSettings" class="btn-secondary">
                    ↺ Restaurar valores
                </button>
            </div>

            <!-- Info -->
            <div class="info-box">
                <p><strong>💡 Tip:</strong> Pasa el cursor sobre cualquier texto en las páginas web y espera a que aparezca la traducción.</p>
            </div>

            <!-- Status Message -->
            <div id="statusMessage" class="status-message"></div>
        </main>

        <footer>
            <small>v1.0.0 | Powered by Groq AI</small>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
